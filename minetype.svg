<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges" width="256" height="256">
  <!-- Head (green) -->
  <rect x="2" y="0" width="12" height="12" fill="#5a9e3a"/>

  <!-- Eyes (dark) -->
  <rect x="3" y="2" width="3" height="3" fill="#1a1a1a"/>
  <rect x="10" y="2" width="3" height="3" fill="#1a1a1a"/>

  <!-- Nose / mouth area (darker green) -->
  <rect x="5" y="5" width="6" height="2" fill="#3d7a25"/>

  <!-- Mouth (dark) -->
  <rect x="4" y="7" width="3" height="2" fill="#1a1a1a"/>
  <rect x="9" y="7" width="3" height="2" fill="#1a1a1a"/>
  <rect x="5" y="9" width="6" height="2" fill="#1a1a1a"/>

  <!-- Body (green, narrower) -->
  <rect x="4" y="12" width="8" height="4" fill="#4a8a2f"/>
</svg>
